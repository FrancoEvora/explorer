name: Reparar autenticação Explorer

on:
  push:
    paths:
      - ".github/workflows/fix-auth-module.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Corrigir inicialização e clique
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          cloud = Path('cloud.js')
          js = cloud.read_text()

          old = """  async function signUp() {
    if (!client) return;
"""
          new = """  async function signUp() {
    if (!client && window.supabase?.createClient) {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });
    }
    if (!client) {
      setAuthMessage('A conexão segura ainda está carregando. Aguarde um instante e tente novamente.', 'error');
      return;
    }
"""
          if old in js:
              js = js.replace(old, new, 1)

          old_in = """  async function signIn() {
    if (!client) return;
"""
          new_in = """  async function signIn() {
    if (!client && window.supabase?.createClient) {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });
    }
    if (!client) {
      setAuthMessage('A conexão segura ainda está carregando. Aguarde um instante e tente novamente.', 'error');
      return;
    }
"""
          if old_in in js:
              js = js.replace(old_in, new_in, 1)

          js = js.replace(
              "    signOut,\n    getUser: () => user,",
              "    signOut,\n    signUp,\n    signIn,\n    getUser: () => user,",
              1
          )
          cloud.write_text(js)

          app = Path('app.js')
          appjs = app.read_text()
          old_boot = "document.addEventListener('DOMContentLoaded', bootstrap);"
          new_boot = "if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', () => bootstrap().catch((error) => console.error('Falha ao iniciar Explorer', error)), { once: true }); } else { queueMicrotask(() => bootstrap().catch((error) => console.error('Falha ao iniciar Explorer', error))); }"
          if old_boot in appjs:
              appjs = appjs.replace(old_boot, new_boot, 1)
          app.write_text(appjs)

          index = Path('index.html')
          html = index.read_text()
          marker = 'explorer-auth-click-bridge'
          bridge = '''
  <script id="explorer-auth-click-bridge">
  document.addEventListener('click', function(event) {
    var signup = event.target.closest && event.target.closest('#btnSignUp');
    var signin = event.target.closest && event.target.closest('#btnSignIn');
    if (!signup && !signin) return;
    var cloud = window.ExplorerCloud;
    if (!cloud) {
      var message = document.getElementById('authMessage');
      if (message) {
        message.textContent = 'A conexão segura ainda está carregando. Aguarde um instante e tente novamente.';
        message.dataset.tone = 'error';
      }
      return;
    }
    event.preventDefault();
    event.stopImmediatePropagation();
    if (signup && cloud.signUp) cloud.signUp();
    if (signin && cloud.signIn) cloud.signIn();
  }, true);
  </script>
'''
          if marker not in html:
              html = html.replace('</body>', bridge + '\n</body>')
          html = html.replace('Explorer · v1.0', 'Explorer · v1.0.3')
          html = html.replace('Explorer v1.0</span>', 'Explorer v1.0.3</span>')
          html = html.replace('>v1.0</span>', '>v1.0.3</span>')
          index.write_text(html)
          PY

      - name: Publicar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud.js app.js index.html
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Corrige autenticação do Explorer v1.0.3"
          git push
