name: Publicar Explorer 4.0

on:
  push:
    paths:
      - "release_v4/text*.part"
      - ".github/workflows/publish-explorer-v4.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Montar aplicação de produção
        shell: bash
        run: |
          set -euo pipefail
          test -d release_v4
          find release_v4 -maxdepth 1 -name 'text*.part' -type f | sort -V > /tmp/explorer_parts.txt
          test -s /tmp/explorer_parts.txt
          xargs cat < /tmp/explorer_parts.txt > index.html
          grep -q '<title>Explorer 4.0</title>' index.html
          grep -q 'Identificar com IA' index.html
          grep -q 'Registrar risco' index.html
          grep -q 'Modo SOS' index.html
          printf '4.0.0\n' > VERSION

      - name: Publicar compilação consolidada
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publica Explorer 4.0 consolidado"
          git push
