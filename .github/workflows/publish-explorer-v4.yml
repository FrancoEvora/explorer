name: Publicar Explorer 4.0 estático

on:
  push:
    paths:
      - "bootstrap_v4/part*.b64"
      - ".github/workflows/publish-explorer-v4.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Reconstruir HTML estático
        shell: bash
        run: |
          set -euo pipefail
          cat \
            bootstrap_v4/part00.b64 \
            bootstrap_v4/part01.b64 \
            bootstrap_v4/part02.b64 \
            bootstrap_v4/part03.b64 \
            bootstrap_v4/part040.b64 \
            | tr -d '\n\r ' > /tmp/explorer.b64
          base64 --decode /tmp/explorer.b64 > /tmp/explorer.html.xz
          xz --decompress --stdout /tmp/explorer.html.xz > index.html
          test "$(wc -c < index.html)" -gt 100000
          grep -q '<title>Explorer 4.0</title>' index.html
          grep -q 'Identificar com IA' index.html
          grep -q 'Registrar risco' index.html
          grep -q 'Modo SOS' index.html
          printf '4.0.3\n' > VERSION

      - name: Publicar HTML pronto
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html VERSION
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publica Explorer 4.0.3 estático sem descompressão no navegador"
          git push
