name: Corrigir autenticação do Explorer

on:
  push:
    paths:
      - ".github/workflows/fix-auth-bootstrap.yml"
      - "app.js"
      - "cloud.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Corrigir inicialização e carregamento do Supabase
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('app.js')
          app = app_path.read_text(encoding='utf-8')
          old_boot = "document.addEventListener('DOMContentLoaded', bootstrap);"
          new_boot = """if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
              bootstrap().catch((error) => console.error('Falha ao iniciar Explorer', error));
            }, { once: true });
          } else {
            queueMicrotask(() => bootstrap().catch((error) => console.error('Falha ao iniciar Explorer', error)));
          }"""
          if old_boot in app:
              app = app.replace(old_boot, new_boot, 1)
          app_path.write_text(app, encoding='utf-8')

          cloud_path = Path('cloud.js')
          cloud = cloud_path.read_text(encoding='utf-8')
          marker = "  async function start(options = {}) {"
          helper = """  async function waitForSupabase(timeoutMs = 12000) {
            if (window.supabase?.createClient) return true;
            const started = Date.now();
            let script = document.querySelector('script[src*=\"supabase-js\"]');
            if (!script) {
              script = document.createElement('script');
              script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
              script.async = true;
              document.head.appendChild(script);
            }
            while (Date.now() - started < timeoutMs) {
              if (window.supabase?.createClient) return true;
              await new Promise((resolve) => setTimeout(resolve, 120));
            }
            return Boolean(window.supabase?.createClient);
          }

"""
          if helper not in cloud and marker in cloud:
              cloud = cloud.replace(marker, helper + marker, 1)

          old_check = """    if (!window.supabase?.createClient) {
              setAuthMessage('Não foi possível carregar a conexão segura. Verifique a internet e atualize a página.', 'error');
              showAuth();
              return;
            }
"""
          new_check = """    if (!window.supabase?.createClient) {
              setAuthMessage('Preparando a conexão segura…', 'muted');
              await waitForSupabase();
            }
            if (!window.supabase?.createClient) {
              setAuthMessage('Não foi possível carregar a conexão segura. Verifique a internet e atualize a página.', 'error');
              showAuth();
              return;
            }
"""
          if old_check in cloud:
              cloud = cloud.replace(old_check, new_check, 1)

          cloud = cloud.replace("const APP_VERSION = '1.0.0';", "const APP_VERSION = '1.0.1';", 1)

          cloud = cloud.replace(
              "  async function signIn() {\n    if (!client) return;",
              "  async function signIn() {\n    if (!client) { setAuthMessage('A conexão ainda está sendo preparada. Aguarde um instante e tente novamente.', 'error'); return; }",
              1,
          )
          cloud = cloud.replace(
              "  async function signUp() {\n    if (!client) return;",
              "  async function signUp() {\n    if (!client) { setAuthMessage('A conexão ainda está sendo preparada. Aguarde um instante e tente novamente.', 'error'); return; }",
              1,
          )
          cloud_path.write_text(cloud, encoding='utf-8')
          PY

      - name: Publicar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js cloud.js
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Corrige criação da primeira conta no Explorer"
          git push
