<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#061722">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Explorer">
  <title>Explorer 4.0</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;background:#061722;font-family:system-ui,-apple-system,sans-serif}.loading{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 18% 0,#16566a,#061722 55%,#020a10);color:#f5fbff}.card{width:min(430px,90vw);padding:32px;border-radius:30px;text-align:center;background:#0b2b3ae8;border:1px solid #ffffff20;box-shadow:0 30px 90px #0009}.mark{width:92px;height:92px;margin:auto}.card h1{margin:16px 0 4px;font-size:2.35rem;letter-spacing:-.06em}.card p{color:#9eb6c2;line-height:1.5}.bar{height:7px;border-radius:99px;background:#ffffff12;overflow:hidden;margin-top:22px}.bar:after{content:"";display:block;width:36%;height:100%;background:linear-gradient(90deg,#c7ff19,#168cff,#ff3d8d,#ff721c);animation:move 1.1s infinite}@keyframes move{from{transform:translateX(-110%)}to{transform:translateX(380%)}}
  </style>
</head>
<body>
  <main class="loading"><section class="card">
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="43" fill="#071923" stroke="#c7ff19" stroke-width="5"/><path d="M50 5 58 40 50 50 42 40Z" fill="#c7ff19"/><path d="M95 50 60 58 50 50 60 42Z" fill="#168cff"/><path d="M50 95 42 60 50 50 58 60Z" fill="#ff3d8d"/><path d="M5 50 40 42 50 50 40 58Z" fill="#ff721c"/><circle cx="50" cy="50" r="9" fill="#f5fbff"/></svg>
    <h1>Explorer 4.0</h1><p id="status">Abrindo a rede social outdoor…</p><div class="bar"></div>
  </section></main>
  <script type="module">
    const BASE='https://raw.githubusercontent.com/FrancoEvora/explorer/fca3712b907f7381d9f479bb941bab2d928918ab/bootstrap_v4/';
    const PARTS=['part00.b64','part01.b64','part02.b64','part03.b64','part040.b64'];
    const status=document.getElementById('status');
    try{
      if('serviceWorker' in navigator){for(const registration of await navigator.serviceWorker.getRegistrations()) await registration.unregister();}
      if('caches' in window){for(const key of await caches.keys()) await caches.delete(key);}
      status.textContent='Baixando a compilação definitiva…';
      const parts=await Promise.all(PARTS.map(async name=>{const response=await fetch(BASE+name,{cache:'no-store'});if(!response.ok)throw new Error('Arquivo de produção ausente: '+name);return response.text();}));
      const encoded=parts.join('').replace(/\s+/g,'');
      const binary=atob(encoded);
      const compressed=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) compressed[i]=binary.charCodeAt(i);
      status.textContent='Descompactando o Explorer 4.0…';
      const {XzReadableStream}=await import('https://esm.sh/xz-decompress@0.2.3');
      const html=await new Response(new XzReadableStream(new Blob([compressed]).stream())).text();
      if(!html.includes('<title>Explorer 4.0</title>'))throw new Error('A compilação recebida não é o Explorer 4.0.');
      document.open();document.write(html);document.close();
    }catch(error){console.error(error);status.textContent='Falha ao abrir: '+error.message;document.querySelector('.bar')?.remove();}
  </script>
</body>
</html>
